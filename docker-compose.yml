version: '3.8'

networks:
  market-echo-net:
    driver: bridge

volumes:
  clickhouse-data:
  clickhouse-logs:
  grafana-data:
  flink-checkpoints:

services:

  # ── Kafka (KRaft mode) ────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - market-echo-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Kafka Topic Setup ──────────────────────────────────────────────────────
  kafka-setup:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-setup
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - market-echo-net
    entrypoint: 
    - /bin/bash
    - -c
    - |
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic price_ticks --partitions 3 --replication-factor 1 --config retention.ms=604800000
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic news_raw --partitions 1 --replication-factor 1 --config retention.ms=604800000
      echo '>>> Topics ready:'
      kafka-topics --list --bootstrap-server kafka:29092
    restart: on-failure

  # ── Kafka UI ───────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: market-echo
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - market-echo-net

  # ── Flink JobManager ──────────────────────────────────────────────────────
  flink-jobmanager:
    build:
      context: ./docker/flink
    image: market-echo-flink:latest
    container_name: flink-jobmanager
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1600m
        state.backend: hashmap
        state.checkpoints.dir: file:///opt/flink/checkpoints
        execution.checkpointing.interval: 60000
        execution.checkpointing.mode: AT_LEAST_ONCE
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
      - ./flink_jobs:/opt/flink/jobs
    networks:
      - market-echo-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 15s
      timeout: 10s
      retries: 8

  # ── Flink TaskManager ─────────────────────────────────────────────────────
  flink-taskmanager:
    image: market-echo-flink:latest
    container_name: flink-taskmanager
    command: taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 1728m
        taskmanager.numberOfTaskSlots: 4
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
      - ./flink_jobs:/opt/flink/jobs
    networks:
      - market-echo-net

  # ── ClickHouse ────────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: market_echo
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ./clickhouse/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - market-echo-net
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - market-echo-net
